name: Build EBOOT.PBP

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: pspdev/pspdev:latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Compile EBOOT.PBP Directly
      run: |
        # ✨ ライブラリの並び順を「依存関係の深い順」に最適化
        /usr/local/pspdev/bin/psp-gcc -I/usr/local/pspdev/psp/include -I/usr/local/pspdev/psp/sdk/include -L/usr/local/pspdev/psp/sdk/lib -O2 -G0 -Wall -D_PSP_FW_VERSION=600 main.c \
        -lpspdebug -lpspvfpu -lpspdisplay -lpspgu -lpspgum -lpspge -lpspnet_apctl -lpspnet_resolver -lpspnet_inet -lpspnet -lpsputility -lpspuser -lpspkernel \
        -o 3ds_receiver.elf
        
        /usr/local/pspdev/bin/psp-prxgen 3ds_receiver.elf 3ds_receiver.prx
        /usr/local/pspdev/bin/pack-pbp EBOOT.PBP PARAM.SFO NULL NULL NULL NULL NULL 3ds_receiver.prx NULL
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PSP-Receiver-EBOOT
        path: EBOOT.PBP
