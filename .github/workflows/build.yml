name: Build EBOOT.PBP

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: pspdev/pspdev:latest  # ✨常に最新の公式環境を使用
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Compile EBOOT.PBP
      run: |
        # ✨コンテナ内の正しいビルド環境変数を確実に反映させてmakeを実行
        make

    - name: Upload Artifact
      uses: actions/artifacts@v4
      with:
        name: PSP-Receiver-EBOOT
        path: EBOOT.PBP
